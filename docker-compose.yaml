services:
  db:
    image: postgres:17.4
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAMEDB}
      POSTGRES_USER: ${DB_USERNAME}
    container_name: TestDB
    volumes:
      - ./postgres:/var/lib/postgresql/data